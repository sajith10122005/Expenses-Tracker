<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }
    .login-box h2 {
      margin-bottom: 20px;
    }
    .login-box form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-box input[type="text"],
    .login-box input[type="password"],
    .login-box input[type="email"],
    .login-box input[type="number"]{
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }
    .login-box input[type="submit"] {
      width: 85%;
      padding: 10px;
      background: #008000;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
    .login-box input[type="submit"]:hover {
      background: #005bb5;
    }
    
    #error{
      color:red;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form action="register.php" method="post" onsubmit="return validateForm()">
      <input type="text" name="username" placeholder="Enter Username" required>
      <input type="email" name="email" placeholder="Enter EmailId" required>
      <input type="text" name="mobile" placeholder="Enter 10 digit mobie number" pattern="[0-9]{10}" title="Enter exactly 10 digits" required>
      <input type="password" name="password" id="password" placeholder="Enter Password" minlength="6" required>
      <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" minlength="6" required>
      <span id="error"></span>
      <input type="submit" value="submit">
      <span id="link" style="margin-top:5px">already have account<a href="login.html"> login</a></span>
    </form>
  </div>
  <script>
    function validateForm(){
      var password=document.getElementById("password");
      var confirmPassword=document.getElementById("confirmPassword");
      if(password.value===confirmPassword.value)
        return true;
      else{
        document.getElementById("error").innerText="Passowrd must be same";
        confirmPassword.focus();
        return false;
      }
    }
  </script>
</body>
</html>
